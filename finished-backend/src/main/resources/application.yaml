server:
  port: 8080

spring:
  minio:
    endpoint: "${MINIO_ENDPOINT:http://localhost:9000}"
    username: "${MINIO_USERNAME:minioadmin}"
    password: "${MINIO_PASSWORD:minioadmin}"
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: "${DB_USERNAME:root}"
    password: "${DB_PASSWORD:}"
    url: "${DB_URL:jdbc:mysql://localhost:3306/campus_forum?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}"
  security:
    jwt:
      key: "${JWT_KEY:dev-key-change-me}"
  mail:
    host: "${MAIL_HOST:smtp.163.com}"
    username: "${MAIL_USERNAME:}"
    password: "${MAIL_PASSWORD:}"
  rabbitmq:
    addresses: "${RABBITMQ_HOST:localhost}"
    username: "${RABBITMQ_USER:guest}"
    password: "${RABBITMQ_PASSWORD:guest}"
    virtual-host: /
  weather:
    key: "${WEATHER_KEY:}"
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto