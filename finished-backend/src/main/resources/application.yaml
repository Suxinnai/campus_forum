server:
  port: 8080

app:
  image-storage-path: "${IMAGE_STORAGE_PATH:./uploads}"

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: "${DB_USERNAME:root}"
    password: "${DB_PASSWORD:}"
    url: "${DB_URL:jdbc:mysql://localhost:3306/campus_forum?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}"
  security:
    jwt:
      key: "${JWT_KEY:dev-key-change-me}"
  mail:
    host: "${MAIL_HOST:smtp.163.com}"
    port: "${MAIL_PORT:465}"
    username: "${MAIL_USERNAME:}"
    password: "${MAIL_PASSWORD:}"
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
  rabbitmq:
    addresses: "${RABBITMQ_HOST:localhost}"
    username: "${RABBITMQ_USER:guest}"
    password: "${RABBITMQ_PASSWORD:guest}"
    virtual-host: /
  weather:
    key: "${WEATHER_KEY:}"
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /api/docs/ui
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
