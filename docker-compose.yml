version: "2.4"

services:
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.0
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: campus_forum
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./new_tables.sql:/docker-entrypoint-initdb.d/02-new_tables.sql:ro
      - ./comment_system_migration.sql:/docker-entrypoint-initdb.d/03-comment-system.sql:ro
      - ./admin_fix_patch.sql:/docker-entrypoint-initdb.d/04-admin-fix.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./finished-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/campus_forum?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      JWT_KEY: ${JWT_KEY}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      IMAGE_STORAGE_PATH: /app/uploads
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: http://8.137.220.131
      TZ: Asia/Shanghai
    volumes:
      - backend-uploads:/app/uploads

  frontend:
    build:
      context: ./finished-frontend
      args:
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql-data:
  redis-data:
  backend-uploads:
